<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PPTVC</title>

    <!-- Office JavaScript API -->
    <script
      type="text/javascript"
      src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"
    ></script>

    <!-- Fluent UI Fabric Core -->
    <link
      rel="stylesheet"
      href="https://res-1.cdn.office.net/files/fabric-cdn-prod_20230815.002/office-ui-fabric-core/11.1.0/css/fabric.min.css"
    />

    <!-- Task pane styles -->
    <link href="taskpane.css" rel="stylesheet" type="text/css" />
  </head>

  <body class="ms-font-m ms-Fabric">
    <section id="sideload-msg" class="pptvc-sideload">
      <p class="ms-font-m">
        Please
        <a
          target="_blank"
          rel="noopener noreferrer"
          href="https://learn.microsoft.com/office/dev/add-ins/testing/test-debug-office-add-ins#sideload-an-office-add-in-for-testing"
        >
          sideload
        </a>
        the add-in to continue.
      </p>
    </section>

    <main id="app-body" class="pptvc-app-body pptvc-hidden">
      <header class="pptvc-header">
        <h1 class="pptvc-title">PPTVC</h1>
        <p class="pptvc-subtitle ms-font-s">Version Control for PowerPoint</p>
      </header>

      <section class="pptvc-section">
        <button id="btn-save" type="button" class="pptvc-btn pptvc-btn--primary ms-font-m">
          <span class="btn-label">Save Version</span>
          <span class="btn-spinner pptvc-hidden" aria-hidden="true"></span>
        </button>
        <div id="status-msg" class="pptvc-status" role="status" aria-live="polite"></div>
      </section>

      <section class="pptvc-section pptvc-section--list">
        <h2 class="pptvc-section-title ms-font-xs">Versions</h2>

        <div id="versions-loading" class="pptvc-loading pptvc-hidden">
          <div class="pptvc-spinner"></div>
        </div>

        <ul id="versions-list" class="pptvc-versions-list" role="list"></ul>

        <p id="versions-empty" class="pptvc-empty ms-font-s pptvc-hidden">No versions saved yet.</p>
      </section>
    </main>
  </body>
</html>
