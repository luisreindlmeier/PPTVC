<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PPTVC</title>

    <!-- Fonts: Plus Jakarta Sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600&display=swap"
      rel="stylesheet"
    />

    <!-- Office JavaScript API -->
    <script
      type="text/javascript"
      src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"
    ></script>

    <!-- Task pane styles -->
    <link href="taskpane.css" rel="stylesheet" type="text/css" />
  </head>

  <body>
    <section id="sideload-msg" class="pptvc-sideload">
      <p>
        Please
        <a
          target="_blank"
          rel="noopener noreferrer"
          href="https://learn.microsoft.com/office/dev/add-ins/testing/test-debug-office-add-ins#sideload-an-office-add-in-for-testing"
          >sideload</a
        >
        the add-in to continue.
      </p>
    </section>

    <main id="app-body" class="pptvc-app pptvc-hidden">
      <!-- ── Header ── -->
      <header class="pptvc-header">
        <div class="pptvc-header-main">
          <h1 class="pptvc-title">PPTVC</h1>
          <p class="pptvc-subtitle">Version Control for PowerPoint</p>
        </div>
        <div class="pptvc-slide-scope">
          <button
            id="btn-slide-scope"
            type="button"
            class="pptvc-slide-scope-btn"
            aria-label="Slide comparison scope"
            aria-expanded="false"
          >
            Presentation
          </button>
          <div
            id="slide-scope-panel"
            class="pptvc-slide-scope-panel pptvc-hidden"
            role="group"
            aria-label="Slides to compare"
          >
            <div id="slide-scope-options" class="pptvc-slide-scope-options"></div>
          </div>
        </div>
      </header>

      <!-- ── Tabs: History / Diff / Workflow ── -->
      <div class="pptvc-scope-bar">
        <div class="pptvc-scope-bar__track" role="tablist" aria-label="View">
          <div class="pptvc-scope-bar__indicator" id="scope-indicator"></div>
          <button
            type="button"
            role="tab"
            id="tab-history"
            class="pptvc-scope-tab pptvc-scope-tab--active"
            aria-selected="true"
          >
            History
          </button>
          <button
            type="button"
            role="tab"
            id="tab-diff"
            class="pptvc-scope-tab"
            aria-selected="false"
          >
            Diff
          </button>
          <button
            type="button"
            role="tab"
            id="tab-workflow"
            class="pptvc-scope-tab"
            aria-selected="false"
          >
            Workflow
          </button>
        </div>
      </div>

      <!-- ── History scope ── -->
      <div id="history-scope">
        <!-- Save panel -->
        <section class="pptvc-save-panel">
          <!-- Save panel title -->
          <h2 class="pptvc-section-title pptvc-save-panel-title">
            Save New Version <span class="pptvc-save-count"></span>
          </h2>
          <div class="pptvc-save-input-row">
            <input
              id="version-name-input"
              type="text"
              class="pptvc-text-input"
              placeholder="Version name"
              maxlength="60"
              aria-label="Version name"
            />
            <button
              id="btn-tag-dropdown"
              type="button"
              class="pptvc-save-tag-dropdown"
              aria-label="Add tags"
              aria-expanded="false"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                viewBox="0 0 10 6"
                fill="currentColor"
                aria-hidden="true"
              >
                <path d="M0 0l5 6 5-6H0z" />
              </svg>
            </button>
          </div>

          <!-- Collapsible tag picker -->
          <div
            id="save-tags-panel"
            class="pptvc-save-tags-panel pptvc-hidden"
            role="group"
            aria-label="Tags"
          >
            <div id="save-tag-picker" class="pptvc-save-tag-picker"></div>
          </div>

          <button id="btn-save" type="button" class="pptvc-btn pptvc-btn--primary">
            <span class="btn-label">Save Version</span>
            <span class="btn-spinner pptvc-hidden" aria-hidden="true"></span>
          </button>
        </section>

        <!-- Status message -->
        <div id="status-msg" class="pptvc-status" role="status" aria-live="polite"></div>

        <!-- Versions list (timeline) -->
        <section class="pptvc-list-section">
          <h2 id="versions-title" class="pptvc-section-title pptvc-list-title">
            History <span class="pptvc-list-count"></span>
          </h2>

          <div id="versions-loading" class="pptvc-loading pptvc-hidden">
            <div class="pptvc-spinner"></div>
          </div>

          <ul id="versions-list" class="pptvc-versions-list" role="list"></ul>

          <p id="versions-empty" class="pptvc-empty pptvc-hidden">No versions saved yet.</p>
        </section>
      </div>

      <!-- ── Diff scope ── -->
      <div id="diff-scope" class="pptvc-hidden">
        <div id="diff-content" class="pptvc-diff-scope"></div>
      </div>

      <!-- ── Workflow scope ── -->
      <div id="workflow-scope" class="pptvc-hidden">
        <section class="pptvc-workflow-scope">
          <p class="pptvc-empty">Workflow tools coming soon.</p>
        </section>
      </div>
    </main>
  </body>
</html>
